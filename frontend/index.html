<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .wrap { width: 100%; max-width: 400px; }

    /* ── Logo ───────────────────────────────────────────────────────────── */
    .logo-area { text-align: center; margin-bottom: 2rem; }

    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 0.9rem;
      box-shadow: 0 0 0 1px rgba(37,99,235,0.3), 0 0 40px rgba(37,99,235,0.25);
    }
    .logo-icon svg {
      width: 30px; height: 30px; fill: none;
      stroke: #7dd3fc; stroke-width: 1.75;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .brand { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; color: #e2e8f0; }
    .brand-dot { color: #7dd3fc; }
    .tagline { font-size: 0.78rem; color: #475569; margin-top: 0.3rem; letter-spacing: 0.01em; }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: #1a2030;
      border: 1px solid #252f42;
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    }

    .card-title { font-size: 1.05rem; font-weight: 600; color: #e2e8f0; margin-bottom: 0.25rem; }
    .card-sub   { font-size: 0.78rem; color: #64748b; margin-bottom: 1.75rem; }

    /* ── Form ───────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: #64748b; margin-bottom: 0.4rem;
    }

    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: #475569; fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none; transition: stroke 0.15s;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #1e293b;
      border-radius: 0.6rem;
      color: #e2e8f0;
      padding: 0.65rem 0.85rem 0.65rem 2.45rem;
      font-size: 0.93rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.18);
    }
    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { stroke: #7dd3fc; }

    /* ── Error ──────────────────────────────────────────────────────────── */
    .error-box {
      display: none;
      align-items: center; gap: 0.5rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 0.6rem;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem; color: #f87171;
      margin-bottom: 1.1rem;
    }
    .error-box.show { display: flex; }
    .error-box svg { flex-shrink: 0; }

    /* ── Submit button ──────────────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      border: none; border-radius: 0.65rem;
      padding: 0.75rem;
      font-size: 0.93rem; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
      box-shadow: 0 4px 18px rgba(37,99,235,0.35);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(37,99,235,0.45);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); opacity: 0.9; }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    .footer {
      text-align: center; margin-top: 2rem;
      font-size: 0.7rem; color: #1e293b;
    }

    /* ── Hint ────────────────────────────────────────────────────────────── */
    .hint-box {
      margin-top: 1.25rem;
      background: rgba(37,99,235,0.06);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 0.6rem;
      padding: 0.65rem 0.85rem;
      font-size: 0.75rem; color: #475569;
      line-height: 1.6;
    }
    .hint-box b { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2.5"/>
          <path d="M8 21h8M12 17v4M7 8h2M7 11.5h4"/>
          <circle cx="16" cy="9.5" r="2"/>
        </svg>
      </div>
      <div class="brand">Aether<span class="brand-dot">.</span></div>
      <div class="tagline">Cloud Vending Management Platform</div>
    </div>

    <!-- Login card -->
    <div class="card">
      <div class="card-title">Sign in to your account</div>
      <div class="card-sub">Enter your credentials to access the dashboard</div>

      <div class="error-box" id="errorBox">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorTxt"></span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Enter username"
                   autocomplete="username" required spellcheck="false">
            <svg class="input-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter password"
                   autocomplete="current-password" required>
            <svg class="input-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-label">Sign In</span>
        </button>
      </form>

      <!-- MVP hint -->
      <div class="hint-box">
        Demo accounts &nbsp;·&nbsp;
        <b>admin</b> / 12345 &nbsp;(full access) &nbsp;&nbsp;
        <b>company</b> / 12345 &nbsp;(restricted view)
      </div>
    </div>

    <div class="footer">© 2026 Aether &nbsp;·&nbsp; Cloud Vending Platform MVP v1.0</div>
  </div>

  <!-- ── Config: update before deploying to cPanel ───────────────────────── -->
  <!-- <script>window.AETHER_API_BASE = 'https://your-app.azurewebsites.net';</script> -->
  <script src="app.js"></script>
  <script>
    // Redirect if already authenticated
    (function () {
      const t = getToken(), u = getUser();
      if (t && u) window.location.replace(u.role === 'admin' ? 'admin.html' : 'company.html');
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const errorBox = document.getElementById('errorBox');
      const errorTxt = document.getElementById('errorTxt');

      errorBox.classList.remove('show');
      btn.classList.add('loading');
      btn.disabled = true;

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const result = await login(username, password);

      if (result.success) {
        const user = getUser();
        window.location.replace(user.role === 'admin' ? 'admin.html' : 'company.html');
      } else {
        errorTxt.textContent = result.error || 'Invalid credentials. Please try again.';
        errorBox.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
        document.getElementById('password').select();
      }
    }
  </script>
</body>
</html>
